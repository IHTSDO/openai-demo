<mat-card appearance="outlined">
  <mat-card-content>
    <h2 class="tab-title">Explain ECL query</h2>
    <p class="tab-subtitle">Get a plain-language explanation of an Expression Constraint Language (ECL) query.</p>

    <mat-form-field appearance="outline" class="example-full-width">
      <mat-label>ECL query</mat-label>
      <textarea matInput placeholder="Enter expression…" rows="8" [(ngModel)]="eclToExplain"></textarea>
    </mat-form-field>

    <div class="tab-actions">
      <button mat-flat-button color="primary" (click)="runEclExplanation()" [disabled]="loadingExplain">
        <mat-icon>auto_awesome</mat-icon> Explain
      </button>
      <mat-spinner diameter="22" *ngIf="loadingExplain"></mat-spinner>
    </div>

    <h3 class="section-title">Explanation</h3>
    <div class="result-surface"><app-typewriter [message]="explainResult"></app-typewriter></div>
  </mat-card-content>
</mat-card>
