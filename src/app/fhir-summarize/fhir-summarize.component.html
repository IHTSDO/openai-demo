<mat-card appearance="outlined">
  <mat-card-content>
    <h2 class="tab-title">Summarize FHIR resource</h2>
    <p class="tab-subtitle">Summarize a FHIR resource in plain language.</p>

    <mat-form-field appearance="outline" class="example-full-width">
      <mat-label>FHIR resource (JSON)</mat-label>
      <textarea matInput placeholder="Paste JSON FHIR resource…" rows="8" [(ngModel)]="fhirResource"></textarea>
    </mat-form-field>

    <div class="tab-actions">
      <button mat-flat-button color="primary" (click)="runFhirSummarization()" [disabled]="loadingFhirSummary">
        <mat-icon>auto_awesome</mat-icon> Summarize
      </button>
      <mat-spinner diameter="22" *ngIf="loadingFhirSummary"></mat-spinner>
    </div>

    <h3 class="section-title">Summary</h3>
    <div class="result-surface"><app-typewriter [message]="fhirSummaryResult"></app-typewriter></div>
  </mat-card-content>
</mat-card>
