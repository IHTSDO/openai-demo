<mat-card appearance="outlined">
  <mat-card-content>
    <h2 class="tab-title">Term generation</h2>
    <p class="tab-subtitle">Generate a human-readable term for a postcoordinated SNOMED&nbsp;CT expression.</p>

    <mat-form-field appearance="outline" class="example-full-width">
      <mat-label>Postcoordinated expression</mat-label>
      <textarea matInput placeholder="Enter expression…" rows="8" [(ngModel)]="pcExpression"></textarea>
    </mat-form-field>

    <div class="tab-actions">
      <button mat-flat-button color="primary" (click)="runPCECompletion()" [disabled]="loadingPce">
        <mat-icon>auto_awesome</mat-icon> Generate term
      </button>
      <mat-radio-group aria-label="Term style" [(ngModel)]="termStyle">
        <mat-radio-button value="1">Concise</mat-radio-button>
        <mat-radio-button value="2">Comprehensive</mat-radio-button>
      </mat-radio-group>
      <mat-spinner diameter="22" *ngIf="loadingPce"></mat-spinner>
    </div>

    <h3 class="section-title">Result</h3>
    <div class="result-surface"><app-typewriter [message]="result"></app-typewriter></div>
  </mat-card-content>
</mat-card>
