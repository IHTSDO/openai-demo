<mat-card appearance="outlined">
  <mat-card-content>
    <h2 class="tab-title">SNOMED Q&amp;A</h2>
    <p class="tab-subtitle">Ask a SNOMED&nbsp;CT support question — pick an example or write your own.</p>

    <mat-form-field appearance="outline" class="example-full-width">
      <mat-label>Support question</mat-label>
      <textarea matInput placeholder="Type your question…" rows="4" [(ngModel)]="supportQuestion"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="example-full-width">
      <mat-label>Response language</mat-label>
      <mat-select [(ngModel)]="selectedLanguage">
        <mat-option *ngFor="let language of languages" [value]="language.code">{{ language.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="result-chips">
      <mat-chip-set>
        <mat-chip (click)="askQuestion(item.prompt)" *ngFor="let item of questions">{{item.title}}</mat-chip>
      </mat-chip-set>
    </div>

    <p class="warning">Responses are generated by an LLM and are not guaranteed to be correct or useful.</p>

    <div class="tab-actions">
      <button mat-flat-button color="primary" (click)="runSupportQuestion()" [disabled]="loadingSupportResponse">
        <mat-icon>forum</mat-icon> Respond
      </button>
      <mat-spinner diameter="22" *ngIf="loadingSupportResponse"></mat-spinner>
    </div>

    <h3 class="section-title">Response</h3>
    <div class="result-surface"><app-typewriter [message]="supportResult"></app-typewriter></div>
  </mat-card-content>
</mat-card>
