<mat-card appearance="outlined">
  <mat-card-content>
    <h2 class="tab-title">Patient-friendly terms</h2>
    <p class="tab-subtitle">Rewrite clinical text into patient-friendly language in the chosen language.</p>

    <mat-form-field appearance="outline" class="example-full-width">
      <mat-label>Target language</mat-label>
      <mat-select [(ngModel)]="language">
        <mat-option *ngFor="let loopLang of languages" [value]="loopLang">{{loopLang}}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="example-full-width">
      <mat-label>Original clinical text</mat-label>
      <textarea matInput placeholder="Enter text…" rows="5" [(ngModel)]="sourceTextPt"></textarea>
    </mat-form-field>

    <div class="result-chips">
      <mat-chip-set>
        <mat-chip (click)="run(item)" *ngFor="let item of terms">{{item}}</mat-chip>
      </mat-chip-set>
    </div>

    <div class="tab-actions">
      <button mat-flat-button color="primary" (click)="runPatientFriendlyVersion()" [disabled]="loadingPt">
        <mat-icon>auto_awesome</mat-icon> Generate
      </button>
      <mat-spinner diameter="22" *ngIf="loadingPt"></mat-spinner>
    </div>

    <h3 class="section-title">Result</h3>
    <div class="result-surface"><app-typewriter [message]="ptResult"></app-typewriter></div>
  </mat-card-content>
</mat-card>
