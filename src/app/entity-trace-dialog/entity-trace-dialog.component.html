<h2 mat-dialog-title>
  Flow · "{{ trace.term }}"
  <span class="badge" [class.ok]="trace.matched" [class.fail]="!trace.matched">
    {{ trace.matched ? 'matched' : 'unresolved' }}
  </span>
</h2>

<mat-dialog-content>
  <div class="flow">
    <div class="step" *ngFor="let step of trace.steps; let last = last" [ngClass]="'status-' + step.status">
      <div class="marker">
        <mat-icon>{{ iconFor(step.status) }}</mat-icon>
        <div class="line" *ngIf="!last"></div>
      </div>
      <div class="body">
        <div class="stage-row">
          <span class="stage">{{ step.stage }}</span>
          <span class="src-pill" [ngClass]="source(step.stage).cls">{{ source(step.stage).label }}</span>
        </div>
        <div class="title">{{ step.title }}</div>
        <div class="detail">{{ step.detail }}</div>

        <!-- Candidates returned by the terminology server (search step) -->
        <table class="candidates" *ngIf="step.data?.candidates?.length">
          <tr>
            <th></th>
            <th>Code</th>
            <th>Display</th>
            <th>Dist.</th>
          </tr>
          <tr *ngFor="let c of step.data.candidates" [class.chosen]="c.chosen">
            <td>{{ c.chosen ? '✓' : '' }}</td>
            <td>{{ c.code }}</td>
            <td>{{ c.display }}</td>
            <td>{{ c.distance }}</td>
          </tr>
        </table>

        <div class="ecl" *ngIf="step.data?.ecl">ECL: <code>{{ step.data.ecl }}</code></div>
      </div>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
