name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx ng build --configuration production
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # esbuild "application" builder emits the site under browser/
          path: dist/ng-coding-demo-template/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
